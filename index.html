<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simplex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <main class="workspace">
      <section class="composer reveal">
        <form id="simplex-form" class="model-form">
          <section class="equation-zone">
            <div class="zone-head compact-zone-head">
              <p class="zone-label">Funcion objetivo</p>
              <label class="field inline-field objective-mode-field">
                <span>Modo</span>
                <button id="objective-toggle" class="button secondary objective-toggle" type="button" aria-label="Cambiar entre maximizar y minimizar"></button>
              </label>
            </div>
            <div id="objective-expression" class="equation-grid"></div>
          </section>

          <section class="equation-zone">
            <div class="zone-head compact-zone-head">
              <div class="dimension-bar embedded-dimension-bar" role="group" aria-label="Dimensiones del modelo">
                <label class="field inline-count-field">
                  <span>Variables</span>
                  <input id="variable-count" class="compact-number-input dimension-input" type="number" min="1" max="10" step="1" value="2" aria-label="Cantidad de variables">
                  <span class="mini-stepper">
                    <button class="mini-stepper-button" type="button" data-delta="1" aria-label="Aumentar cantidad de variables" title="Aumentar cantidad de variables">&#9650;</button>
                    <button class="mini-stepper-button" type="button" data-delta="-1" aria-label="Reducir cantidad de variables" title="Reducir cantidad de variables">&#9660;</button>
                  </span>
                </label>
                <label class="field inline-count-field">
                  <span>Restricciones</span>
                  <input id="constraint-count" class="compact-number-input dimension-input" type="number" min="1" max="10" step="1" value="3" aria-label="Cantidad de restricciones">
                  <span class="mini-stepper">
                    <button class="mini-stepper-button" type="button" data-delta="1" aria-label="Aumentar cantidad de restricciones" title="Aumentar cantidad de restricciones">&#9650;</button>
                    <button class="mini-stepper-button" type="button" data-delta="-1" aria-label="Reducir cantidad de restricciones" title="Reducir cantidad de restricciones">&#9660;</button>
                  </span>
                </label>
              </div>
            </div>
            <div id="constraints-list" class="constraint-list"></div>
          </section>

          <div class="action-row">
            <button class="button primary" type="submit">Resolver y generar tablas</button>
          </div>
        </form>
      </section>

      <section class="results reveal" id="results-section">
        <div class="section-heading results-heading">
          <p class="section-kicker">Resultado</p>
          <h2>Tablas, pivotes y solucion final</h2>
        </div>

        <div id="result-summary" class="result-summary empty-state">
          Carga un modelo y presiona <strong>Resolver y generar tablas</strong> para ver el desarrollo completo.
        </div>

        <div id="graph-panel" class="graph-panel hidden"></div>

        <div id="iteration-groups" class="iteration-groups"></div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
