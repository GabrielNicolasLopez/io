<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#09110f">
  <title>Investigacion Operativa | Asignacion</title>
  <link rel="icon" type="image/x-icon" href="../favicon.ico">
  <script>
    if ("scrollRestoration" in history) {
      history.scrollRestoration = "manual";
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css?v=20260517n">
</head>
<body>
  <div class="app-shell">
    <main class="workspace">
      <section class="page-header reveal">
        <div class="page-header-bar">
          <div class="section-heading">
            <p class="section-kicker">UTN FRBA</p>
            <h1>Investigacion Operativa</h1>
          </div>
        </div>
      </section>

      <section class="route-shell reveal">
        <nav class="route-strip" aria-label="Temas">
          <a class="route-link" href="../home/">Inicio</a>
          <a class="route-link" href="../simplex/">Simplex</a>
          <a class="route-link" href="../transporte/">Transporte</a>
          <a class="route-link is-active" href="../asignacion/">Asignacion</a>
          <a class="route-link" href="../decision/">Teoria de Decision</a>
          <a class="route-link" href="../juegos/">Teoria de Juegos</a>
        </nav>

        <div class="route-panel">
          <section class="results transport-panel">
            <form id="assignment-form" class="transport-form">
              <input id="assignment-row-count" type="hidden" value="5">
              <input id="assignment-column-count" type="hidden" value="5">
              <div class="zone-head transport-toolbar assignment-toolbar">
                <div class="assignment-toolbar-stack">
                  <div class="assignment-toolbar-row assignment-toolbar-row-primary">
                    <div class="display-mode-toggle assignment-mode-toggle">
                      <span class="display-mode-label">Resolver como</span>
                      <div class="display-mode-buttons" role="group" aria-label="Tipo de resolucion para asignacion">
                        <button class="display-mode-button" type="button" data-assignment-mode="min" aria-pressed="true">
                          Minimo
                        </button>
                        <button class="display-mode-button" type="button" data-assignment-mode="max" aria-pressed="false">
                          Maximo
                        </button>
                      </div>
                    </div>
                  </div>
                  <div class="assignment-toolbar-row assignment-toolbar-row-secondary">
                    <div class="transport-action-row">
                      <div class="display-mode-toggle assignment-examples-toggle">
                        <span class="display-mode-label">Ejemplos</span>
                        <div class="display-mode-buttons assignment-example-buttons" role="group" aria-label="Ejemplos de asignacion">
                          <button id="assignment-load-minimum-button" class="display-mode-button assignment-example-button" type="button" data-assignment-example="minimum">
                            Ejercicio de minimos
                          </button>
                          <button id="assignment-load-maximum-button" class="display-mode-button assignment-example-button" type="button" data-assignment-example="maximum">
                            Ejercicio de maximos
                          </button>
                        </div>
                      </div>
                      <button id="assignment-clear-button" class="button secondary transport-clear-button assignment-clear-button" type="button">
                        Limpiar Tabla
                      </button>
                    </div>
                  </div>
                </div>
              </div>

              <div id="assignment-grid" class="transport-grid"></div>
            </form>
            <div id="assignment-results" class="transport-results"></div>
          </section>
        </div>
      </section>
    </main>
  </div>
  <script src="./script.js?v=20260518b"></script>
</body>
</html>
